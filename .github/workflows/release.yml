name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.os_label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_label: linux
            asset_name: SwimTrackManager-linux-x86_64.tar.gz
          - os: windows-latest
            os_label: windows
            asset_name: SwimTrackManager-windows-x86_64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Download FFmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ffmpeg_bundle
          curl -L -o ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf ffmpeg.tar.xz
          extracted_dir=$(find . -maxdepth 1 -type d -name 'ffmpeg-*-amd64-static' | head -n1)
          cp "$extracted_dir/ffmpeg" ffmpeg_bundle/
          cp "$extracted_dir/ffprobe" ffmpeg_bundle/
          chmod +x ffmpeg_bundle/ffmpeg ffmpeg_bundle/ffprobe
          echo "FFMPEG_BUNDLE_DIR=$(pwd)/ffmpeg_bundle" >> "$GITHUB_ENV"

      - name: Download FFmpeg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ffmpeg_bundle | Out-Null
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extracted
          $bin = Get-ChildItem -Path ffmpeg_extracted -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item -Path (Join-Path $bin.DirectoryName "ffmpeg.exe") -Destination ffmpeg_bundle/
          Copy-Item -Path (Join-Path $bin.DirectoryName "ffprobe.exe") -Destination ffmpeg_bundle/
          "FFMPEG_BUNDLE_DIR=$((Get-Item ffmpeg_bundle).FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Compress FFmpeg with UPX (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y upx-ucl
          ls -lh ffmpeg_bundle/
          upx --best --lzma ffmpeg_bundle/ffmpeg ffmpeg_bundle/ffprobe || true
          ls -lh ffmpeg_bundle/

      - name: Compress FFmpeg with UPX (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $upxVersion = "4.2.4"
          $upxUrl = "https://github.com/upx/upx/releases/download/v$upxVersion/upx-$upxVersion-win64.zip"
          Invoke-WebRequest -Uri $upxUrl -OutFile upx.zip
          Expand-Archive -Path upx.zip -DestinationPath upx_extracted
          $upxExe = Get-ChildItem -Path upx_extracted -Recurse -Filter "upx.exe" | Select-Object -First 1
          Get-ChildItem ffmpeg_bundle | Format-Table Name, Length
          & $upxExe.FullName --best --lzma ffmpeg_bundle/ffmpeg.exe ffmpeg_bundle/ffprobe.exe
          if ($LASTEXITCODE -ne 0) { Write-Host "UPX returned $LASTEXITCODE (continuing)" }
          Get-ChildItem ffmpeg_bundle | Format-Table Name, Length

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --noconfirm SwimTrackManager.spec

      - name: Package Linux artifact
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cd dist
          tar -czf "../${{ matrix.asset_name }}" SwimTrackManager

      - name: Package Windows artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/SwimTrackManager -DestinationPath "${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute release tag
        id: tag
        run: |
          short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
          tag="v$(date -u +%Y.%m.%d)-${short_sha}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: SwimTrack Manager ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
